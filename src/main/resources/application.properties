spring.application.name=taskflow

# Conexión a PostgreSQL — usa variables de entorno en producción (Render las inyecta)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://192.168.56.101:5432/taskflow}
spring.datasource.username=${DB_USER:appuser}
spring.datasource.password=${DB_PASSWORD:user}
spring.datasource.driver-class-name=org.postgresql.Driver
server.servlet.context-path=/

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Serializar LocalDate/LocalDateTime como strings ISO ("2025-12-31") en vez de arrays [2025,12,31]
spring.jackson.serialization.write-dates-as-timestamps=false

# Render asigna el puerto via $PORT
server.port=${PORT:8080}
